<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>

    <!-- icones -->
    <script src="https://kit.fontawesome.com/870a34a90c.js" crossorigin="anonymous"></script>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL,GRAD@400,0,0" />

    <!-- estilos -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/darkmode.css">

    <!-- fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <a href="../index.html"><i class="fa-solid fa-house"></i>Página Inicial</a>
        <a href="./sobre.html"><i class="fa-solid fa-users"></i>Sobre o grupo</a>
        <a href="./contato.html"><i class="fa-solid fa-address-card"></i>Contato</a>
        <a href="./seguranca.html"><i class="fa-solid fa-lock"></i>Gerador de senhas</a>

        <div class="botoes">
            <span class="material-symbols-outlined" onclick="aumentarFonte()">text_increase</span>
            <span class="material-symbols-outlined" onclick="fonteNormal()">rotate_auto</span>
            <span class="material-symbols-outlined" onclick="diminuirFonte()">text_decrease</span>
            <span class="material-symbols-outlined mudarTema" onclick="mudarTema()">dark_mode</span>
        </div>
    </nav>

    <main class="contatoMain"></main>
    <h1 class="title">Contato</h1>

    <form>
        <div class="form">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" placeholder="Digite seu nome.">
        </div>

        <div class="form">
            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" placeholder="(00) 0 0000-0000">
        </div>

        <div class="form">
            <label for="email">E-mail:</label>
            <input type="email" id="email" placeholder="seuemail@exemplo.com">
        </div>

        <div class="form">
            <label for="text">Sua mensagem:</label>
            <textarea id="text" rows="5" placeholder="Digite sua mensagem aqui."></textarea>
        </div>

        <div class="form">
            <label for="arquivo">Anexar arquivo <i>(opcional):</i></label>
            <input type="file" id="arquivo">
        </div>

        <div class="botoes">
            <button type="submit" onclick="alert('Página em construção.')">Enviar</button>
            <button type="reset">Limpar</button>
        </div>
    </form>
    </main>

    <footer class="footer">
        © Ana Cláudia Tasso, Daniéli Narciso, Gláucia Carine Tasso - ADS UPF 2026/1
    </footer>

    <script src="../js/script.js"></script>
</body>

</html>
