<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas</title>

    <!-- icones -->
    <script src="https://kit.fontawesome.com/870a34a90c.js" crossorigin="anonymous"></script>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL,GRAD@400,0,0" />

    <!-- estilos -->
    <link rel="stylesheet" href="../css/style.css">

    <!-- fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div>
            <a href="../index.html">Página Inicial</a>
            <a href="./sobre.html">Sobre</a>
            <a href="./contato.html">Contato</a>
        </div>

        <div class="botoes">
            <span class="material-symbols-outlined">text_increase</span>
            <span class="material-symbols-outlined">rotate_auto</span>
            <span class="material-symbols-outlined">text_decrease</span>
            <span class="material-symbols-outlined">dark_mode</span>
        </div>
    </nav>

    <main>
        <h1 class="title">Gerador de senhas</h1>
        <p class="senhap">Clique para gerar uma senha forte aleatória</p>
        <span class="password" id="password" onclick="gerarSenha()">***********</span>
        <div class="botaocopiar">
        <button id="copiar" onclick="copiarSenha()">Copiar senha</button>
        </div>
    </main>
    
    <script src="../js/script.js"></script>
</body>
</html>
